# ============================================================
# CI PIPELINE
# ============================================================

name: CI Pipeline

# Trigger the pipeline whenever code is pushed to main
on:
  push:
    branches:
      - main

  # Also run CI for Pull Requests
  pull_request:
    branches:
      - main


jobs:
  ci-pipeline:

    # GitHub provides a fresh Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:

      # ========================================================
      # STEP 1: CHECKOUT CODE
      # ========================================================
      # Downloads your GitHub repository code
      - name: 1. Checkout Code
        uses: actions/checkout@v4


      # ========================================================
      # STEP 2: INSTALL DEPENDENCIES
      # ========================================================
      # Installs all packages from package.json
      - name: 2. Install Dependencies
        run: npm ci


      # ========================================================
      # STEP 3: LINT
      # ========================================================
      # Checks the code for errors and coding issues
      - name: 3. Run Lint
        run: npm run lint


      # ========================================================
      # STEP 4: BUILD
      # ========================================================
      # Creates a production-ready build
      - name: 4. Build Application
        run: npm run build


      # ========================================================
      # STEP 5: RUN TESTS
      # ========================================================
      # Runs automated tests
      - name: 5. Run Tests
        run: npm test


      # ========================================================
      # STEP 6: PACKAGE ARTIFACTS
      # ========================================================
      # Compresses the build folder into a ZIP file
      - name: 6. Package Artifacts
        run: |
          zip -r application-build.zip dist/


      # ========================================================
      # STEP 7: UPLOAD ARTIFACTS
      # ========================================================
      # Saves the ZIP file in GitHub Actions
      - name: 7. Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-build
          path: application-build.zip


      # ========================================================
      # STEP 8: DOCKER BUILD
      # ========================================================
      # Builds the Docker image
      - name: 8. Docker Build
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:latest .


      # ========================================================
      # STEP 9: DOCKER PUSH
      # ========================================================
      # Logs in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Pushes the image to Docker Hub
      - name: 9. Docker Push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest


      # ========================================================
      # STEP 10: NOTIFICATION
      # ========================================================
      # Displays a success message
      - name: 10. Notification
        if: success()
        run: |
          echo "================================="
          echo "CI PIPELINE SUCCESSFUL ✅"
          echo "================================="


      # Notification if any previous step fails
      - name: Pipeline Failed Notification
        if: failure()
        run: |
          echo "================================="
          echo "CI PIPELINE FAILED ❌"
          echo "================================="