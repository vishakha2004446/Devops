name: Demo CI env Secrets

on:
  push
  # workflow_dispatch:

env:
  GLOBAL_APP_ENV: global-dev
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JOB_APP_ENV: job-env

    steps:
      - name: Say Hello
        run: echo "Hello from the second workflow!"

      - name: Install
        env:
          APP_ENV: dev
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment $APP_ENV using $DB_PASSWORD, $GLOBAL_APP_ENV, $JOB_APP_ENV"

      - name: Create Demo File
        run: |
             echo "hello from CI Pipeline" > demo.txt
             echo "File created successfully"

      - name: Upload Demo
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifacts-demo
          path: demo.txt