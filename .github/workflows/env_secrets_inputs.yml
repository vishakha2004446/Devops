name: Demo CI env Secrets

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Say Hello
        run: echo "Hello from the second workflow!"

      - name: Install
        env:
          APP_ENV: dev
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment $APP_ENV using $DB_PASSWORD"